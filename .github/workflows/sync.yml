name: Sync WC2026 results

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Wake Render backend
      run: |
        curl -s "https://worldcup26-predictor.onrender.com/docs" > /dev/null || true
        sleep 40

    - name: Trigger sync on Render
      run: |
        curl -X POST \
          "https://worldcup26-predictor.onrender.com/admin/sync?run_sim=true" \
          -H "X-Sync-Secret: ${{ secrets.SYNC_SECRET }}" \
          -H "Content-Type: application/json" \
          --fail-with-body \
          --show-error
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"